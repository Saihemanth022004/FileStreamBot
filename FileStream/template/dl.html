<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileStream | {{file_name}}</title>
    <link rel="icon" href="/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafb;
            color: #0f0f0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.2); }
            50% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); }
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 16px 32px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .navbar-brand img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .navbar-brand span {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4b4b, #ff0000);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Card */
        .download-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            margin: 0 20px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 24px;
            padding: 48px 36px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            animation: fadeInUp 0.6s ease-out;
        }

        /* File Icon */
        .file-icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: rgba(255, 0, 0, 0.06);
            border: 1px solid rgba(255, 0, 0, 0.1);
        }

        .file-icon-wrapper svg {
            width: 36px;
            height: 36px;
            color: #ff0000;
        }

        /* File Name */
        .file-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0f0f0f;
            word-break: break-word;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        /* File Size */
        .file-size {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .file-size svg {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }

        /* Download Button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 32px;
            border-radius: 14px;
            border: none;
            background: #ff0000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            animation: pulse 2.5s infinite;
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        .download-btn:hover {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(255, 0, 0, 0.25);
            animation: none;
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        /* Copy Link */
        .copy-link-btn {
            margin-top: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 24px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: #f3f4f6;
            color: #374151;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .copy-link-btn svg {
            width: 16px;
            height: 16px;
        }

        .copy-link-btn:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
            color: #111827;
            transform: translateY(-2px);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 18px 20px;
            color: #6b7280;
            font-size: 0.72rem;
            z-index: 1;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .download-card { padding: 36px 24px; border-radius: 20px; }
            .file-name { font-size: 1rem; }
            .navbar { padding: 14px 18px; }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <img src="/logo.png" alt="Logo">
            <span>File Stream</span>
        </a>
    </nav>

    <!-- Download Card -->
    <div class="download-card">
        <div class="file-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
            </svg>
        </div>

        <div class="file-name">{{file_name}}</div>
        <div class="file-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            <span>{{file_size}}</span>
        </div>

        <a class="download-btn" href="{{file_url}}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Download
        </a>

        <button class="copy-link-btn" onclick="copyLink()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
            </svg>
            Copy Download Link
        </button>
    </div>

    <div class="footer">
        Powered by FileStream Bot
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Link copied!</div>

    <script>
        function copyLink() {
            const url = '{{file_url}}';
            navigator.clipboard.writeText(url).then(() => {
                showToast('Download link copied!');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = url;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Download link copied!');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>

</html>
