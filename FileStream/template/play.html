<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileStream | {{file_name}}</title>
    <link rel="icon" href="/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #07070d radial-gradient(circle at 15% 50px, rgba(108, 60, 224, 0.15), transparent 40%),
                        radial-gradient(circle at 85% 90%, rgba(33, 150, 243, 0.15), transparent 40%);
            background-attachment: fixed;
            color: #e4e4ed;
            min-height: 100vh;
            overflow-x: hidden;
        }



        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(7, 7, 13, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .navbar-brand img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .navbar-brand span {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #6c3ce0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .navbar-status {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .navbar-status::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        /* Main Container */
        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Video Card */
        .video-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .video-container {
            width: 100%;
            background: #000;
            line-height: 0;
        }

        .video-container video {
            width: 100%;
            display: block;
        }

        /* Plyr customization */
        :root {
            --plyr-color-main: #7c3aed;
            --plyr-video-control-color: #fff;
            --plyr-video-control-background: rgba(0,0,0,0.6);
        }

        /* File Info */
        .file-info {
            padding: 24px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .file-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f0f0f8;
            word-break: break-word;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .file-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .file-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
        }

        .file-meta-item svg {
            width: 15px;
            height: 15px;
            opacity: 0.6;
        }

        /* Action Buttons */
        .actions {
            padding: 20px 28px 28px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #d0d0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            will-change: transform;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.4);
            color: #c4b5fd;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.15);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #7c3aed, #6c3ce0);
            border-color: transparent;
            color: #fff;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.3);
            transform: translateY(-2px);
        }

        /* Audio Warning Banner */
        .audio-warning {
            display: none;
            padding: 16px 24px;
            background: rgba(251, 146, 60, 0.12);
            border: 1px solid rgba(251, 146, 60, 0.3);
            border-radius: 0;
            border-left: none;
            border-right: none;
            color: #fbbf24;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: center;
            animation: fadeInUp 0.4s ease-out;
        }
        .audio-warning.show {
            display: block;
        }
        .audio-warning svg {
            width: 18px;
            height: 18px;
            vertical-align: -4px;
            margin-right: 6px;
        }
        .audio-warning strong {
            color: #fde68a;
        }
        .audio-warning .sub {
            display: block;
            margin-top: 4px;
            font-size: 0.78rem;
            color: rgba(251, 191, 36, 0.7);
        }

        /* Highlight pulse for external player buttons */
        .action-btn.highlight {
            border-color: rgba(251, 146, 60, 0.6) !important;
            background: rgba(251, 146, 60, 0.12) !important;
            color: #fbbf24 !important;
            animation: pulseHighlight 2s ease-in-out infinite;
        }
        @keyframes pulseHighlight {
            0%, 100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.3); }
            50% { box-shadow: 0 0 16px 4px rgba(251, 146, 60, 0.15); }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(124, 58, 237, 0.9);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 20px;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
        }

        .footer a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .navbar { padding: 14px 18px; }
            .page-wrapper { padding: 80px 12px 30px; }
            .file-info { padding: 18px 20px; }
            .actions { padding: 16px 20px 22px; grid-template-columns: 1fr 1fr; }
            .file-name { font-size: 1rem; }
        }
        @media (max-width: 400px) {
            .actions { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <img src="/logo.png" alt="Logo">
            <span>File Stream</span>
        </a>
        <div class="navbar-status">Streaming</div>
    </nav>

    <!-- Main Content -->
    <div class="page-wrapper">
        <div class="video-card">
            <!-- Video Player -->
            <div class="video-container">
                <video id="player" playsinline controls>
                    <source src="{{file_url}}" type="{{mime_type}}">
                    Your browser does not support this video format.
                </video>
            </div>

            <!-- Audio Warning Banner -->
            <div class="audio-warning" id="audioWarning">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                <strong>Audio codec not supported by your browser.</strong>
                <span class="sub">Use VLC Player or MX Player below for full audio playback.</span>
            </div>

            <!-- File Info -->
            <div class="file-info">
                <div class="file-name">{{file_name}}</div>
                <div class="file-meta">
                    <div class="file-meta-item">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                        <span>{{file_size}}</span>
                    </div>
                    <div class="file-meta-item">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span>Video</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button class="action-btn primary" onclick="streamDownload()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Download
                </button>
                <button class="action-btn" onclick="copyStreamLink()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                    Copy Link
                </button>
                <button class="action-btn" id="btnVlc" onclick="vlc_player()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    VLC Player
                </button>
                <button class="action-btn" id="btnMx" onclick="mx_player()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    MX Player
                </button>
                <button class="action-btn" id="btnNplayer" onclick="n_player()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    nPlayer
                </button>
            </div>
        </div>

        <div class="footer">
            Powered by <a href="#">FileStream Bot</a>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Link copied to clipboard!</div>

    <!-- Scripts -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // Initialize Plyr with all advanced features enabled
        const player = new Plyr('#player', {
            controls: [
                'play-large',   // The large play button in the center
                'restart',      // Restart playback from the beginning
                'rewind',       // Rewind by 10 seconds
                'play',         // Play/pause playback
                'fast-forward', // Fast forward by 10 seconds
                'progress',     // The progress bar and scrubber
                'current-time', // The current time of playback
                'duration',     // The full duration of the media
                'mute',         // Toggle mute
                'volume',       // Volume control
                'settings',     // Settings menu (speed, quality)
                'pip',          // Picture-in-picture mode
                'fullscreen'    // Toggle fullscreen
            ],
            seekTime: 10,       // Fast forward/rewind time in seconds
            keyboard: { focused: true, global: true }, // Enable keyboard shortcuts
            tooltips: { controls: true, seek: true }   // Show helpful tooltips on hover
        });

        // Derive download URL from current page URL
        const streamlink = window.location.href.replace('/watch/', '/dl/');

        // Detect unsupported audio codecs reliably
        (function detectAudioSupport() {
            const videoEl = document.getElementById('player');

            function showAudioWarning() {
                document.getElementById('audioWarning').classList.add('show');
                document.getElementById('btnVlc').classList.add('highlight');
                document.getElementById('btnMx').classList.add('highlight');
                document.getElementById('btnNplayer').classList.add('highlight');
            }

            let checkCount = 0;
            let checkInterval;

            videoEl.addEventListener('playing', function() {
                if (checkCount > 0) return; // Only start interval once
                
                checkInterval = setInterval(() => {
                    checkCount++;
                    
                    // Check via WebKit decoded byte counts (Chrome, Edge, Opera, Safari)
                    if (typeof videoEl.webkitAudioDecodedByteCount !== 'undefined') {
                        // If video is decoding, but audio is not decoding at all after a few seconds
                        // it means the video codec is supported but audio is unsupported.
                        if (videoEl.webkitVideoDecodedByteCount > 0 && videoEl.webkitAudioDecodedByteCount === 0) {
                            showAudioWarning();
                            clearInterval(checkInterval);
                        } else if (videoEl.webkitAudioDecodedByteCount > 0) {
                            // Audio is successfully decoding
                            clearInterval(checkInterval);
                        }
                    } 
                    // Fallback for Safari's audioTracks API
                    else if (videoEl.audioTracks) {
                        if (videoEl.audioTracks.length === 0) {
                            showAudioWarning();
                        }
                        clearInterval(checkInterval);
                    } else {
                        // Firefox doesn't expose these metrics reliably yet, 
                        // so we avoid false positives by not doing anything.
                        clearInterval(checkInterval);
                    }

                    // Stop checking after ~5 seconds to save resources
                    if (checkCount > 10) {
                        clearInterval(checkInterval);
                    }
                }, 500);
            });
        })();

        function streamDownload() {
            window.location.href = streamlink;
        }

        function copyStreamLink() {
            navigator.clipboard.writeText(streamlink.toLowerCase()).then(() => {
                showToast('Link copied to clipboard!');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = streamlink;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Link copied to clipboard!');
            });
        }

        function vlc_player() {
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isAndroid) {
                window.location.href = `intent:${streamlink}#Intent;package=org.videolan.vlc;type=video/*;end`;
            } else if (isIOS) {
                window.location.href = `vlc://${streamlink}`;
            } else {
                // For PC, vlc:// protocol is often unregistered.
                // We generate a tiny .m3u playlist file which auto-opens in VLC or default media player.
                const m3uContent = `#EXTM3U\n#EXTINF:-1,${'{{file_name}}'}\n${streamlink}`;
                const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '{{file_name}}.m3u';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Playlist downloaded! Open the .m3u file in VLC or your default player.');
            }
        }

        function mx_player() {
            window.location.href = `intent:${streamlink}#Intent;package=com.mxtech.videoplayer.ad;end`;
        }

        function n_player() {
            window.location.href = `nplayer-${streamlink}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>

</html>
