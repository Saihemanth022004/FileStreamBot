<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist | {{playlist_title}}</title>
    <link rel="icon" href="/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #0f0f0f; min-height: 100vh; overflow-x: hidden; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0, 0, 0, 0.08); }
        .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .navbar-brand img { width: 32px; height: 32px; border-radius: 8px; }
        .navbar-brand span { font-size: 1.1rem; font-weight: 700; background: linear-gradient(135deg, #ff4b4b, #ff0000); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1.5px; text-transform: uppercase; }
        .navbar-status { font-size: 0.75rem; color: #6b7280; display: flex; align-items: center; gap: 6px; }
        .navbar-status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        
        .page-wrapper { margin-top: 80px; padding: 20px; max-width: 1400px; margin-left: auto; margin-right: auto; display: flex; gap: 24px; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Left Side: Video Player */
        .player-section { flex: 1; min-width: 0; }
        .video-card { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.06); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .video-container { width: 100%; background: #000; line-height: 0; }
        .video-container video { width: 100%; display: block; }
        :root { --plyr-color-main: #ff0000; --plyr-video-control-color: #fff; --plyr-video-control-background: rgba(0,0,0,0.6); }
        
        .file-info { padding: 24px; border-bottom: 1px solid rgba(0, 0, 0, 0.08); }
        .playlist-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; }
        .current-ep-title { font-size: 1.1rem; font-weight: 600; color: #374151; margin-bottom: 8px; word-break: break-word; }
        
        /* Right Side: Playlist Sidebar */
        .playlist-sidebar { width: 400px; background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.06); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); display: flex; flex-direction: column; height: calc(100vh - 120px); position: sticky; top: 90px; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); background: #f9fafb; border-radius: 20px 20px 0 0; }
        .sidebar-header h3 { font-size: 1.1rem; font-weight: 600; }
        .sidebar-header p { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
        .episodes-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .episode-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; }
        .episode-item:hover { background: #f3f4f6; }
        .episode-item.active { background: rgba(255, 0, 0, 0.05); }
        .episode-index { font-size: 0.9rem; color: #6b7280; font-weight: 500; min-width: 24px; text-align: center; }
        .episode-item.active .episode-index { color: #ff0000; }
        .episode-details { flex: 1; min-width: 0; }
        .ep-name { font-size: 0.95rem; font-weight: 500; color: #0f0f0f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .episode-item.active .ep-name { font-weight: 600; color: #0f0f0f; }
        .ep-size { font-size: 0.8rem; color: #6b7280; margin-top: 4px; }
        
        @media (max-width: 1024px) {
            .page-wrapper { flex-direction: column; }
            .playlist-sidebar { width: 100%; height: 500px; position: static; }
        }
        @media (max-width: 640px) {
            .navbar { padding: 14px 18px; }
            .page-wrapper { padding: 80px 12px 20px; gap: 16px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <img src="/logo.png" alt="Logo">
            <span>File Stream</span>
        </a>
        <div class="navbar-status">Playlist Mode</div>
    </nav>

    <div class="page-wrapper">
        <div class="player-section">
            <div class="video-card">
                <div class="video-container">
                    <video id="player" playsinline controls>
                        <!-- Source injected by JS -->
                    </video>
                </div>
                <div class="file-info">
                    <div class="playlist-title">{{playlist_title}}</div>
                    <div class="current-ep-title" id="currentEpTitle">Select an episode to start watching</div>
                </div>
            </div>
        </div>

        <div class="playlist-sidebar">
            <div class="sidebar-header">
                <h3>Episodes</h3>
                <p id="progressText">0 / {{files|length}} videos watched</p>
            </div>
            <div class="episodes-list" id="episodesList">
                {% for f in files %}
                <div class="episode-item" onclick="playEpisode({{loop.index0}})" id="ep-{{loop.index0}}">
                    <div class="episode-index">{{loop.index}}</div>
                    <div class="episode-details">
                        <div class="ep-name">{{f.name}}</div>
                        <div class="ep-size">{{f.size}}</div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const playlistData = {{ files_json | safe }};
        let currentIndex = 0;
        
        const player = new Plyr('#player', {
            controls: ['play-large', 'restart', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            seekTime: 10, keyboard: { focused: true, global: true }
        });

        // Mobile double-tap to seek functionality
        let lastTap = 0;
        document.querySelector('.video-container').addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            
            if (tapLength < 300 && tapLength > 0) {
                const touchX = e.changedTouches[0].clientX;
                const containerRect = this.getBoundingClientRect();
                
                if (touchX > containerRect.left + (containerRect.width / 2)) {
                    player.forward(10); // Right side: Forward 10s
                } else {
                    player.rewind(10);  // Left side: Rewind 10s
                }
            }
            lastTap = currentTime;
        });

        function playEpisode(index) {
            if (index < 0 || index >= playlistData.length) return;
            
            document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById(`ep-${index}`);
            if (activeItem) {
                activeItem.classList.add('active');
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            currentIndex = index;
            const file = playlistData[index];
            if (!file) return;
            
            document.getElementById('currentEpTitle').innerText = file.name;
            document.getElementById('progressText').innerText = `${index + 1} / ${playlistData.length} videos playing`;
            
            player.source = {
                type: 'video',
                title: file.name,
                sources: [
                    { src: file.url, type: file.mime_type }
                ]
            };
            player.play().catch(e => console.log('Autoplay prevented:', e));
        }

        player.on('ended', () => {
            if (currentIndex + 1 < playlistData.length) {
                playEpisode(currentIndex + 1);
            }
        });

        if (playlistData.length > 0) {
            playEpisode(0);
        }
    </script>
</body>
</html>
